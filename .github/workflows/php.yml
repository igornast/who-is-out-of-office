name: Main workflow

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

env:
    default-php-version: '8.4'

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.4.4
                env:
                    MYSQL_ALLOW_EMPTY_PASSWORD: yes
                    MYSQL_DATABASE: ooo_db_test
                    MYSQL_USER: mysql
                    MYSQL_PASSWORD: mysql
                ports:
                    - 3306
                options: >-
                    --health-cmd "mysqladmin ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                php-version: ${{ env.default-php-version }}
                tools: composer, phpunit-bridge
                extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

            - name: Get composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir --working-dir=app)" >> $GITHUB_OUTPUT

            - name: Cache composer dependencies
              uses: actions/cache@v3
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('app/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install Dependencies
              run: composer install --no-progress --optimize-autoloader --working-dir=app

            - name: Run Tests
              run: composer run test-ci --working-dir=app
              env:
                  DATABASE_URL: 'mysql://mysql:mysql@127.0.0.1:${{ job.services.mysql.ports[3306] }}/ooo_db?serverVersion=8.4&charset=utf8'