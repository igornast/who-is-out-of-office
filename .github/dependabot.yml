version: 2
updates:
    - package-ecosystem: "composer"
      directory: "/app"
      open-pull-requests-limit: 2
      schedule:
          interval: "monthly"
      versioning-strategy: increase-if-necessary
      assignees:
          - igorfrbit
      commit-message:
          prefix: "deps(dependabot): "
      groups:
          composer-dependencies:
              patterns:
                  - "*"
