email:
    base:
        title: "Who's OOO"
        preheader: "Who's OOO - Leave Management"
        powered_by: "Powered by Who's OOO"
        rights: "All rights reserved."
    common:
        leave_type: "Leave Type"
        duration: "Duration"
        duration_value: "%count% days"
        date_range: "Date Range"
        status: "Status"
        default_leave_type: "Time Off"
    password_reset:
        subject: Reset your password
        preheader: Click the link below to reset your password
        title: Reset Your Password
        body: We received a request to reset your password. Click the button below to choose a new one.
        button: Reset Password
        link_fallback: "If the button above doesn't work, copy and paste this link into your browser:"
        expiry_note: This link will expire in 1 hour.
        footer: "If you didn't request a password reset, you can safely ignore this email. Your password will remain unchanged."
    invitation:
        subject: "You're invited to Who's OOO"
        preheader: "%inviter_name% invited you to join Who's OOO"
        heading: "Welcome to Who's OOO"
        intro: "%inviter_name% has invited you to join the leave planner at %company%."
        role_label: "Your Role"
        role_default: "Team Member"
        organization_label: "Organization"
        organization_default: "Your Organization"
        default_inviter: "Your colleague"
        description: "Who's OOO is a simple leave management tool that helps your team track time off, manage requests, and stay informed about who's out when."
        button: "Accept Invitation"
    leave_request:
        pending_approval:
            subject: "New leave request from %name%"
            preheader: "%name% submitted a leave request for %date%"
            heading: "Leave Request Awaiting Approval"
            intro: "A leave request from one of your team members is waiting for your review and approval decision."
            employee_label: "Employee"
            reason_label: "Reason"
            action: "Please review the request details and make an approval decision in your Who's OOO dashboard."
            button: "Review Request"
        approved:
            subject: "Leave request approved"
            preheader: "Great news! Your leave request for %date% has been approved"
            heading: "✓ Leave Request Approved"
            greeting: "Hi %name%,"
            body: "Great news! Your leave request has been approved by %approved_by%. Your time off is confirmed."
            status: "Approved"
            approved_by_label: "Approved By"
            auto_approved: "Auto-approved"
            remaining_balance_label: "Remaining Balance"
            info: "Your team has been notified of your time off. Make sure to set your out-of-office status and complete any necessary handovers before your departure."
            button: "View in Calendar"
        rejected:
            subject: "Leave request declined"
            preheader: "Your leave request has been declined and requires a response"
            heading: "Leave Request Declined"
            greeting: "Hi %name%,"
            body: "Your leave request has been declined by %rejected_by%. We understand this may be disappointing—please feel free to discuss alternative dates with your manager."
            default_rejected_by: "your manager"
            status: "Declined"
            declined_by_label: "Declined By"
            info: "You can check the team calendar for available dates or discuss alternative dates with %rejected_by%."
            button: "Go to Dashboard"
        withdrawn:
            subject: "Leave request withdrawn by %name%"
            preheader: "%name% has withdrawn their leave request"
            heading: "Leave Request Withdrawn"
            intro: "%name% has withdrawn their leave request. No further action is required."
            status: "Withdrawn"
            withdrawn_by_label: "Withdrawn By"
            button: "View Dashboard"

