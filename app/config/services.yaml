parameters:
    profile_images_base_path: 'uploads/profile_images'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Infrastructure/Doctrine/Entity'
            - '../src/Module/**/DTO'
            - '../src/Module/**/Constants'
            - '../src/Kernel.php'

    Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler:
        arguments:
            - '%env(DATABASE_URL)%'
            - { db_table: 'user_session' }
