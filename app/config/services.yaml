parameters:
    profile_images_base_path: 'uploads/profile_images'
    email_from_address: '%env(EMAIL_FROM_ADDRESS)%'
    email_from_name: '%env(EMAIL_FROM_NAME)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Infrastructure/Doctrine/Entity'
            - '../src/Module/**/DTO'
            - '../src/Module/**/Constants'
            - '../src/Kernel.php'

    Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler:
        arguments:
            - '%env(DATABASE_URL)%'
            - { db_table: 'user_session' }

    App\Infrastructure\Email\UseCase\Command\:
        resource: '../src/Infrastructure/Email/UseCase/Command/'
        arguments:
            $emailFromAddress: '%email_from_address%'
            $emailFromName: '%email_from_name%'
